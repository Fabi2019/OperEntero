
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de operaciones matemáticas</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <h1 id="titulo">Juego de operaciones matemáticas</h1>
    <p id="numeros"></p>
    <div id="botones">
        <button id="suma" class="operacion">+</button>
        <button id="resta" class="operacion">-</button>
        <button id="multiplicacion" class="operacion">*</button>
        <button id="division" class="operacion">/</button>
        <button id="generar">Generar números</button>
    </div>
    <div id="opciones" class="dirHor">
        <div class="opcion">
            <input type="radio" id="opcion1" name="opcion">
            <label for="opcion1" id="label-opcion1"></label>
        </div>
        <div class="opcion">
            <input type="radio" id="opcion2" name="opcion">
            <label for="opcion2" id="label-opcion2"></label>
        </div>
        <div class="opcion">
            <input type="radio" id="opcion3" name="opcion">
            <label for="opcion3" id="label-opcion3"></label>
        </div>
    </div>
    <button id="enviar">Enviar respuesta</button>
    <p id="resultado-opcion"  class="correcto"></p>
    <script src="script.js"></script>
</body>
</html>
